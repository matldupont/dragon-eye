name: Generate New Cryptid

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Allow manual triggering
    inputs:
      cryptid_name:
        description: 'Name of the cryptid to generate (optional)'
        required: false
        type: string
      use_ai:
        description: 'Use Perplexity Pro AI to generate cryptid details and image'
        required: false
        type: boolean
        default: false

jobs:
  generate-cryptid:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is automatically read from package.json packageManager field

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate new cryptid
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ARGS=""
            if [ -n "${{ inputs.cryptid_name }}" ]; then
              ARGS="--name ${{ inputs.cryptid_name }}"
            fi
            if [ "${{ inputs.use_ai }}" == "true" ]; then
              ARGS="$ARGS --use-ai"
            fi
            pnpm tsx scripts/create-new-cryptid.ts $ARGS
          else
            pnpm tsx scripts/create-new-cryptid.ts
          fi

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer: GitHub Actions <noreply@github.com>
          author: GitHub Actions <noreply@github.com>
          commit-message: "feat: Add new cryptid of the month"
          title: "🔮 New Cryptid of the Month - ${{ steps.date.outputs.date }}"
          body: |
            ## New Cryptid Generated
            
            This PR was automatically generated to add a new cryptid to the database.
            
            ### What's Changed
            - ✅ New cryptid added to cryptid files
            - ✅ Set as Cryptid of the Month
            - ✅ Added placeholder French translations
            
            ### ⚠️ Action Required
            Please review and:
            1. ✅ Image should be auto-generated (if image generation API keys are set)
            2. Review and update French translations in `src/data/cryptidFilesTranslations.ts`
            3. Review the generated cryptid data for accuracy
            
            ### Generated Files
            - `src/data/cryptidFiles.ts` - Updated with new cryptid
            - `src/data/cryptidOfTheMonth.ts` - Updated to new cryptid
            - `src/data/cryptidFilesTranslations.ts` - Added placeholder translations
            
            ---
            *This PR was automatically generated by the cryptid generation workflow.*
          branch: auto/cryptid-of-the-month-${{ steps.date.outputs.date }}
          delete-branch: true
          labels: |
            automated
            cryptid
          draft: false

