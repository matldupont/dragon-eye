<script>
// -------- Tweak defaults persisted in-file --------
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "journal"
}/*EDITMODE-END*/;

// Restore from localStorage if present
const stored = (() => { try { return JSON.parse(localStorage.getItem('de-tweaks') || '{}'); } catch { return {}; } })();
const state = { ...TWEAK_DEFAULTS, ...stored };

function applyTheme(t) {
  document.body.dataset.theme = t;
  document.querySelectorAll('#tweaksPanel input[name="theme"]').forEach(r => {
    r.checked = (r.value === t);
  });
}
applyTheme(state.theme);

// Tweaks host protocol
let editModeActive = false;
window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') {
    editModeActive = true;
    document.getElementById('tweaksPanel').classList.add('open');
  } else if (d.type === '__deactivate_edit_mode') {
    editModeActive = false;
    document.getElementById('tweaksPanel').classList.remove('open');
  }
});
window.parent.postMessage({type: '__edit_mode_available'}, '*');

document.querySelectorAll('#tweaksPanel input[name="theme"]').forEach(r => {
  r.addEventListener('change', (e) => {
    const v = e.target.value;
    state.theme = v;
    applyTheme(v);
    localStorage.setItem('de-tweaks', JSON.stringify(state));
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: {theme: v}}, '*');
  });
});
</script>

// ============================================================
// NAV
// ============================================================
window.Nav = function Nav({ theme, onThemeChange }) {
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [popPos, setPopPos] = React.useState({top:0,right:0});
  const themeLabels = {secret: 'Dossier', xfiles: 'Terminal', journal: 'Journal'};
  const themeIcons = {secret: '◆', xfiles: '◇', journal: '◈'};
  const triggerRef = React.useRef(null);

  React.useEffect(() => {
    const handler = (e) => {
      if (triggerRef.current && !triggerRef.current.contains(e.target)) setPickerOpen(false);
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);

  const handleToggle = () => {
    if (!pickerOpen && triggerRef.current) {
      const r = triggerRef.current.getBoundingClientRect();
      setPopPos({top: r.bottom + 8, right: window.innerWidth - r.right});
    }
    setPickerOpen(!pickerOpen);
  };

  const popover = pickerOpen ? ReactDOM.createPortal(
    React.createElement('div', {
      style: {position:'fixed', top:popPos.top, right:popPos.right, minWidth:'220px', background:'var(--de-paper)', border:'1.5px solid var(--de-ink-soft)', boxShadow:'0 12px 32px rgba(0,0,0,0.25)', zIndex:9999, padding:'6px', display:'flex', flexDirection:'column', gap:'2px'},
      onClick: e => e.stopPropagation()
    },
      ['secret','xfiles','journal'].map(t =>
        React.createElement('button', {key:t, style:{display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', border:'none', background: t === theme ? 'var(--de-paper-2)' : 'transparent', color: t === theme ? 'var(--de-accent)' : 'var(--de-ink)', cursor:'pointer', textAlign:'left', fontFamily:'var(--de-mono)'},
          onClick: () => { onThemeChange(t); setPickerOpen(false); }},
          React.createElement('span', {style:{fontSize:'1.1rem'}}, themeIcons[t]),
          React.createElement('div', null,
            React.createElement('div', {style:{fontFamily:'var(--de-label)', fontSize:'0.75rem', letterSpacing:'0.15em', textTransform:'uppercase'}}, themeLabels[t]),
            React.createElement('div', {style:{fontFamily:'var(--de-mono)', fontSize:'0.65rem', color:'var(--de-ink-soft)', marginTop:'1px'}},
              t === 'secret' ? 'Manila folders & rubber stamps' : t === 'xfiles' ? 'CRT green & scan lines' : 'Polaroids & washi tape')
          ),
          t === theme ? React.createElement('span', {style:{marginLeft:'auto', color:'var(--de-accent)'}}, '✓') : null
        )
      )
    ), document.body
  ) : null;

  return (
    <>
    <nav className="de-nav">
      <div className="de-wrap de-nav-inner">
        <div className="de-logo">
          <window.DragonEyeMark size={30} />
          <span>Dragon Eye</span>
        </div>
        <div className="de-nav-links">
          <a href="#files">Files</a>
          <a href="#about">About</a>
          <a href="#merch">Evidence Locker</a>
          <div ref={triggerRef} style={{marginLeft:'1rem', paddingLeft:'1rem', borderLeft:'1px solid var(--de-ink-soft)'}}>
            <button onClick={handleToggle}
              aria-label="Switch theme" style={{display:'flex', alignItems:'center', gap:'6px', fontFamily:'var(--de-label)', fontSize:'0.72rem', letterSpacing:'0.15em', textTransform:'uppercase', padding:'5px 10px', border:'1px solid var(--de-ink-soft)', background:'transparent', color:'var(--de-ink)', cursor:'pointer'}}>
              <span>{themeIcons[theme]}</span>
              <span>{themeLabels[theme]}</span>
              <span style={{fontSize:'0.7rem', transition:'transform 0.2s', marginLeft:'2px', transform: pickerOpen ? 'rotate(180deg)' : 'none'}}>▾</span>
            </button>
          </div>
        </div>
      </div>
    </nav>
    {popover}
    </>
  );
};

window.DangerPill = function DangerPill({ level }) {
  const cls = `de-danger-pill de-danger-${level.toLowerCase()}`;
  return (

  );
};

  if (theme === "xfiles") return <HeroXFiles featured={featured} onOpen={onOpen} />;

};

// -------- XFILES: terminal briefing ----------
function HeroXFiles({ featured, onOpen }) {
  const [typed, setTyped] = React.useState("");
  const target = `> TARGET: ${featured.name.toUpperCase()}`;
  React.useEffect(() => {
    setTyped("");
    let i = 0;
    const id = setInterval(() => {
      i++;
      setTyped(target.slice(0, i));
      if (i >= target.length) clearInterval(id);
    }, 45);
    return () => clearInterval(id);
  }, [featured.slug]);

  return (
    <section className="de-hero hero-xfiles">
      <div className="de-wrap">
        <div className="hero-xfiles-grid">
          <div>
            <div className="hero-xfiles-meta">
              [ TRANSMISSION 04.18.2026 / 23:47 UTC ] <span className="xfiles-rec">● REC</span>

              THE TRUTH<br/>IS<br/>&nbsp;&nbsp;FILED.

            </div>
            <p className="de-hero-sub" style={{fontFamily:'var(--de-body)', fontSize:'1.3rem', lineHeight:1.3}}>
              &gt; 13 case files active. &gt; Cross-referencing sightings,
              newspaper scans, radio intercepts. &gt; This month's featured subject
              originates from Point Pleasant, WV. &gt; Begin review.
            </p>
            <div style={{display:'flex', gap:'1rem', marginTop:'2rem', flexWrap:'wrap'}}>
              <button className="de-btn" onClick={onOpen}>▸ OPEN_FILE.EXE</button>
              <a className="de-btn" href="#files">GREP ARCHIVES</a>
            </div>
          </div>
          <div className="hero-xfiles-monitor">
            <div className="hero-xfiles-screen">
              <div className="hero-xfiles-hud">
                <div>CAM 04 · POINT PLEASANT</div>
                <div>REC · {featured.firstSighting}</div>

              <img src={featured.image} alt={featured.name} className="hero-xfiles-photo" />
              <div className="hero-xfiles-crosshair"/>

                <div>● THREAT: {featured.dangerLevel.toUpperCase()}</div>

            </div>

// ============================================================
// FILES SECTION — search, filter, grid, modal open
// ============================================================
window.FilesSection = function FilesSection({ theme, cryptids, onOpen }) {
  const [q, setQ] = React.useState("");
  const [region, setRegion] = React.useState("all");
  const [danger, setDanger] = React.useState("all");

  const regions = React.useMemo(() => {
    const set = new Set(cryptids.map(c => c.region));
    return ["all", ...Array.from(set)];
  }, [cryptids]);

  const dangers = ["all", "Low", "Medium", "High", "Unknown"];

  const filtered = React.useMemo(() => {
    const needle = q.trim().toLowerCase();
    return cryptids.filter(c => {
      if (region !== "all" && c.region !== region) return false;
      if (danger !== "all" && c.dangerLevel !== danger) return false;
      if (!needle) return true;
      return (c.name + " " + c.codename + " " + c.region + " " + c.type + " " + (c.alias||""))
        .toLowerCase().includes(needle);
    });
  }, [cryptids, q, region, danger]);

  const label = {
    secret: "Classified Database",
    xfiles: "// GREP ./ARCHIVES",
    journal: "All my files"
  }[theme];
  const sub = {
    secret: `${cryptids.length} subjects. Browse by region or threat level. Clearance checks apply.`,
    xfiles: `> ${cryptids.length} records loaded. Use filters to narrow intercepted data.`,
    journal: `I've got ${cryptids.length} of them so far. Some are just rumors. Some I've seen.`
  }[theme];

  return (
    <section className="de-section files-section" id="files">
      <div className="de-wrap">
        <div className="de-section-head">
          <div>
            <div className="de-eyebrow">Case Archive</div>
            <h2 className="de-section-title">{label}</h2>
          </div>
          <p style={{maxWidth:'36ch', fontFamily:'var(--de-body)', fontSize:'1rem', lineHeight:1.4, margin:0, color:'var(--de-ink-soft)'}}>
            {sub}
          </p>
        </div>

        <div className="de-search-row">
          <div className="files-search">
            <span className="files-search-icon">⌕</span>
            <input
              className="de-input"
              type="text"
              placeholder={theme === 'xfiles' ? '> query_subject...' : theme === 'journal' ? 'Scribble a name...' : 'SEARCH SUBJECT, CODENAME, REGION'}
              value={q}
              onChange={e => setQ(e.target.value)}
            />
          </div>
          <select className="de-input" value={region} onChange={e => setRegion(e.target.value)}>
            {regions.map(r => <option key={r} value={r}>{r === 'all' ? (theme==='journal'?'Every region':'ALL REGIONS') : r}</option>)}
          </select>
          <select className="de-input" value={danger} onChange={e => setDanger(e.target.value)}>
            {dangers.map(d => <option key={d} value={d}>{d === 'all' ? (theme==='journal'?'Any danger':'ALL THREAT LEVELS') : `${theme==='xfiles'?'THREAT: ':''}${d.toUpperCase()}`}</option>)}
          </select>
        </div>

        <div className="de-mono-label" style={{marginBottom:'1rem'}}>
          {filtered.length} / {cryptids.length} {theme === 'journal' ? 'entries' : 'files found'}
        </div>

        {filtered.length === 0 ? (
          <div style={{padding:'3rem', textAlign:'center', border:'1px dashed var(--de-ink-soft)', fontFamily:'var(--de-mono)'}}>
            {theme === 'journal' ? "Nothing in the notebook matches that." : "NO RECORDS MATCH QUERY"}
          </div>
        ) : (
          <div className="de-files-grid">
            {filtered.map((c, i) => (
              <FileCard key={c.slug} cryptid={c} i={i} theme={theme} onOpen={() => onOpen(c)} />
            ))}
          </div>
        )}
      </div>
    </section>
  );
};

function FileCard({ cryptid, i, theme, onOpen }) {
  const rot = ((i * 37) % 5) - 2;  // deterministic rotation for journal
  return (
    <article
      className="de-card"
      style={{animationDelay: `${i * 40}ms`, '--rot': `${rot}deg`}}
      onClick={onOpen}
    >
      <div className="de-card-img-wrap">
        <img src={cryptid.image} alt={cryptid.name} className="de-card-img" loading="lazy" />
        {theme === 'xfiles' && (
          <div className="card-xfiles-hud">
            <span>● {cryptid.codename}</span>
          </div>
        )}
        {theme === 'secret' && (
          <div className="card-secret-stamp">
            <div className="de-mono-label" style={{color:'var(--de-paper)'}}>№ {cryptid.caseNumber}</div>
          </div>
        )}
      </div>
      <div className="de-card-info">
        <h3 className="de-card-name">{cryptid.name}</h3>
        <div className="de-card-meta">
          <span>{cryptid.type}</span>
          <window.DangerPill level={cryptid.dangerLevel}/>
        </div>
        <div className="de-card-region">
          {theme === 'journal' ? cryptid.region : `LOC · ${cryptid.region}`}
        </div>
      </div>
    </article>
  );
}

// ============================================================
// MODAL — full case file
// ============================================================
window.FileModal = function FileModal({ cryptid, theme, onClose }) {
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  if (!cryptid) return null;

  return (
    <div className="de-modal-backdrop" onClick={onClose}>
      <div className={`de-modal de-modal-${theme}`} onClick={e => e.stopPropagation()}>
        <button className="de-modal-close" onClick={onClose} aria-label="Close">✕</button>

        {theme === 'secret' && <ModalSecret c={cryptid}/>}
        {theme === 'xfiles' && <ModalXFiles c={cryptid}/>}
        {theme === 'journal' && <ModalJournal c={cryptid}/>}
      </div>
    </div>
  );
};

// ============================================================
// APP — root component
// ============================================================
function App() {
  const [theme, setTheme] = React.useState(document.body.dataset.theme || 'secret');
  const [open, setOpen] = React.useState(null);

  React.useEffect(() => {
    const obs = new MutationObserver(() => setTheme(document.body.dataset.theme));
    obs.observe(document.body, { attributes: true, attributeFilter: ['data-theme'] });
    return () => obs.disconnect();
  }, []);

  const featured = window.CRYPTIDS.find(c => c.slug === window.FEATURED_SLUG) || window.CRYPTIDS[0];

  return (
    <>
      <window.ClassifiedBar theme={theme}/>
      <window.Nav theme={theme} onThemeChange={(t) => {
        document.body.dataset.theme = t;
        localStorage.setItem('de-tweaks', JSON.stringify({theme: t}));
        window.parent.postMessage({type: '__edit_mode_set_keys', edits: {theme: t}}, '*');
      }}/>
      <window.Hero theme={theme} featured={featured} onOpen={() => setOpen(featured)}/>
      <window.FilesSection theme={theme} cryptids={window.CRYPTIDS} onOpen={setOpen}/>

      <section className="de-about de-section" id="about">
        <div className="de-wrap de-about-grid">
          <div>
            <div className="de-eyebrow">Who we are</div>
            <h2 className="de-section-title">
              {theme === 'xfiles' ? '// DRAGON_EYE/OPS' : theme === 'journal' ? 'About the Agency' : 'About Dragon Eye'}
            </h2>
          </div>
          <div className="de-about-card">
            <p style={{fontFamily:'var(--de-body)', fontSize: theme==='journal' ? '1.4rem' : '1.05rem', lineHeight:1.6, margin:'0 0 1rem'}}>
              Dragon Eye is a kid-friendly agency, ages 8 to 13. We snoop around town and look for clues during school hours on Mondays and Wednesdays.
            </p>
            <p style={{fontFamily:'var(--de-body)', fontSize: theme==='journal' ? '1.4rem' : '1.05rem', lineHeight:1.6, margin:'0 0 1rem'}}>
              Strategy meetings every Monday and Wednesday morning — exclusive to Dragon Eye members.
            </p>
            <p style={{fontFamily:'var(--de-body)', fontSize: theme==='journal' ? '1.4rem' : '1.05rem', lineHeight:1.6, margin:0}}>
              We meet at Dragon Eye HQ, in the heart of the city. Address classified.
            </p>
          </div>
        </div>
      </section>

      <footer className="de-footer">
        <div className="de-wrap de-footer-inner">
          <div>© 2026 Dragon Eye Agency · All files classified</div>
          <div>{window.CRYPTIDS.length} active cases · Last updated 04.18.2026</div>
        </div>
      </footer>

      {open && <window.FileModal cryptid={open} theme={theme} onClose={() => setOpen(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
